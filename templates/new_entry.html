{% extends "base.html" %}

{% block title %}New Entry | Trade Journal{% endblock %}

{% block content %}
<section>
    <h2>Create New Journal Entry</h2>
</section>

<section>
    <form action="{{ url_for('new_entry') }}" method="POST">
        <div>
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div>
            <label for="amount_risked">Amount Risked</label>
            <input type="number" step="0.01" id="amount_risked" name="amount_risked" required>
        </div>

        <div>
            <label for="pnl">P&amp;L</label>
            <input type="number" step="0.01" id="pnl" name="pnl" required>
        </div>

        <div>
            <label for="portfolio_change">Portfolio Change</label>
            <input type="number" step="0.01" id="portfolio_change" name="portfolio_change" required>
        </div>

        <div>
            <label for="result">Result</label>
            <select id="result" name="result" required>
                <option value="">Select one</option>
                <option value="win">Win</option>
                <option value="loss">Loss</option>
                <option value="breakeven">Break-even</option>
            </select>
        </div>

        <div>
            <label for="notes">Journal Notes</label>
            <textarea id="notes" name="notes" rows="8" placeholder="Write your thoughts for the day..."></textarea>
        </div>

        <div>
            <button type="submit">Save Entry</button>
        </div>
    </form>
</section>
{% endblock %}
