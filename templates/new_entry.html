{% extends "base.html" %}

{% block title %}New Entry | Trade Journal{% endblock %}

{% block content %}

<form action="{{ url_for('new_entry') }}" method="POST" class="journal-form">

    <!-- METADATA BAR -->
    <div class="meta-bar">

        <div class="meta-field">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>
        </div>

        <div class="meta-divider"></div>

        <div class="meta-field">
            <label for="pnl">P&amp;L</label>
            <input type="number" step="0.01" id="pnl" name="pnl" placeholder="0.00" required>
        </div>

        <div class="meta-field">
            <label for="amount_risked">Risked</label>
            <input type="number" step="0.01" id="amount_risked" name="amount_risked" placeholder="0.00" required>
        </div>

        <div class="meta-field">
            <label for="portfolio_change">Portfolio %</label>
            <input type="number" step="0.01" id="portfolio_change" name="portfolio_change" placeholder="0.00" required>
        </div>

        <div class="meta-divider"></div>

        <!-- Radio toggle group -->
        <div class="result-toggle">
            <input type="radio" id="result-win" name="result" value="win" required>
            <label for="result-win" class="toggle-win">Win</label>

            <input type="radio" id="result-loss" name="result" value="loss">
            <label for="result-loss" class="toggle-loss">Loss</label>

            <input type="radio" id="result-breakeven" name="result" value="breakeven">
            <label for="result-breakeven" class="toggle-breakeven">B/E</label>
        </div>

        <div class="meta-divider"></div>

        <div class="meta-actions">
            <a href="{{ url_for('entries') }}" class="btn-cancel">Cancel</a>
            <button type="submit" class="btn-save">Save Entry</button>
        </div>

    </div>

    <!-- WRITING SURFACE -->
    <div class="journal-page">
        <div class="journal-date-heading" id="journal-date-display">— New Entry —</div>
        <textarea
            id="notes"
            name="notes"
            class="journal-textarea"
            placeholder="Start writing..."
            required
        >--Setup:


--Reason for taking the trade:


--How I felt during the trade:


--What went well:


--What went wrong:


--What I should improve tomorrow:

        </textarea>
    </div>

</form>

<script>
    // Auto-grow textarea as user types
    const textarea = document.getElementById('notes');
    textarea.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = this.scrollHeight + 'px';
    });

    // Set today's date as default
    const dateInput = document.getElementById('date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.value = today;

    // Update the heading display when date changes
    const heading = document.getElementById('journal-date-display');
    function updateHeading() {
        if (dateInput.value) {
            const d = new Date(dateInput.value + 'T00:00:00');
            heading.textContent = d.toLocaleDateString('en-US', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });
        }
    }
    dateInput.addEventListener('change', updateHeading);
    updateHeading();

    // Color PNL input as user types
    const pnlInput = document.getElementById('pnl');
    pnlInput.addEventListener('input', function() {
        const val = parseFloat(this.value);
        if (val > 0) this.style.color = '#22c55e';
        else if (val < 0) this.style.color = '#ef4444';
        else this.style.color = '#f8f9fa';
    });
</script>

{% endblock %}-->
