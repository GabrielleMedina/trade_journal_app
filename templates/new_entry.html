{% extends "base.html" %}

{% block title %}New Entry | Trade Journal{% endblock %}

{% block content %}
<section class="mb-4">
    <h2 class="mb-1">Create New Journal Entry</h2>
    <p class="text-light-emphasis mb-0">Log your trading day and save it to your journal.</p>
</section>

<section>
    <div class="card p-4">
        <form action="{{ url_for('new_entry') }}" method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="date" class="form-label">Date</label>
                    <input type="date" id="date" name="date" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="amount_risked" class="form-label">Amount Risked</label>
                    <input type="number" step="0.01" id="amount_risked" name="amount_risked" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="pnl" class="form-label">P&amp;L</label>
                    <input type="number" step="0.01" id="pnl" name="pnl" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="portfolio_change" class="form-label">Portfolio Change</label>
                    <input type="number" step="0.01" id="portfolio_change" name="portfolio_change" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="result" class="form-label">Result</label>
                    <select id="result" name="result" class="form-select" required>
                        <option value="">Select one</option>
                        <option value="Win">Win</option>
                        <option value="Loss">Loss</option>
                        <option value="Breakeven">Break-even</option>
                    </select>
                </div>

                <div class="col-12">
                    <label for="notes" class="form-label">Journal Notes</label>
                    <textarea id="notes" name="notes" rows="8" class="form-control" placeholder="Write your thoughts for the day..."></textarea>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-success">Save Entry</button>
                    <a href="{{ url_for('entries') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</section>
{% endblock %}
