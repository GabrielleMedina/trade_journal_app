{% extends "base.html" %}

{% block title %}Edit Entry | Trade Journal{% endblock %}

{% block content %}
<section>
    <h2>Edit Journal Entry</h2>
    <p><a href="{{ url_for('entries') }}">← Back to Entries</a></p>
</section>

<section>
    <form action="{{ url_for('edit_entry', entry_id=entry.id) }}" method="POST">

        <div>
            <label for="date">Date</label>
            <input 
                type="date" 
                id="date" 
                name="date"
                value="{{ entry.date }}"
                required>
        </div>

        <div>
            <label for="amount_risked">Amount Risked</label>
            <input 
                type="number" 
                step="0.01"
                id="amount_risked"
                name="amount_risked"
                value="{{ entry.amount_risked }}"
                required>
        </div>

        <div>
            <label for="pnl">P&amp;L</label>
            <input 
                type="number" 
                step="0.01"
                id="pnl"
                name="pnl"
                value="{{ entry.pnl }}"
                required>
        </div>

        <div>
            <label for="portfolio_change">Portfolio Change</label>
            <input 
                type="number" 
                step="0.01"
                id="portfolio_change"
                name="portfolio_change"
                value="{{ entry.portfolio_change }}"
                required>
        </div>

        <div>
            <label for="result">Result</label>
            <select id="result" name="result" required>
                <option value="win" {% if entry.result == "win" %}selected{% endif %}>Win</option>
                <option value="loss" {% if entry.result == "loss" %}selected{% endif %}>Loss</option>
                <option value="breakeven" {% if entry.result == "breakeven" %}selected{% endif %}>Break-even</option>
            </select>
        </div>

        <div>
            <label for="notes">Journal Notes</label>
            <textarea 
                id="notes"
                name="notes"
                rows="8"
                required>{{ entry.notes }}</textarea>
        </div>

        <div>
            <button type="submit">Save Changes</button>
            <a href="{{ url_for('entries') }}">Cancel</a>
        </div>

    </form>
</section>
{% endblock %}
