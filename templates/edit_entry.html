{% extends "base.html" %}

{% block title %}Edit Entry | Trade Journal{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="mb-4">
        <h2 class="fw-bold">Edit Trading Journal Entry</h2>
        <p class="text-light-emphasis mb-0">
            Update your trade details and reflection.
        </p>
    </div>

    <form action="{{ url_for('edit_entry', entry_id=entry.id) }}" method="POST">
        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card bg-dark text-light border-secondary shadow-sm h-100">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Trade Details</h4>

                        <div class="mb-3">
                            <label for="date" class="form-label">Date</label>
                            <input type="date" id="date" name="date"
                                class="form-control bg-dark text-light border-secondary"
                                value="{{ entry.date }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="amount_risked" class="form-label">Amount Risked</label>
                            <input type="number" step="0.01" id="amount_risked" name="amount_risked"
                                class="form-control bg-dark text-light border-secondary"
                                value="{{ entry.amount_risked }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="pnl" class="form-label">P&amp;L</label>
                            <input type="number" step="0.01" id="pnl" name="pnl"
                                class="form-control bg-dark text-light border-secondary"
                                value="{{ entry.pnl }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="portfolio_change" class="form-label">Portfolio Change</label>
                            <input type="number" step="0.01" id="portfolio_change" name="portfolio_change"
                                class="form-control bg-dark text-light border-secondary"
                                value="{{ entry.portfolio_change }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="result" class="form-label">Result</label>
                            <select id="result" name="result"
                                class="form-select bg-dark text-light border-secondary" required>
                                <option value="win" {% if entry.result == "win" %}selected{% endif %}>Win</option>
                                <option value="loss" {% if entry.result == "loss" %}selected{% endif %}>Loss</option>
                                <option value="breakeven" {% if entry.result == "breakeven" %}selected{% endif %}>Break-even</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card bg-dark text-light border-secondary shadow-sm h-100">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Trade Reflection</h4>

                        <label for="notes" class="form-label">Journal Entry</label>
                        <textarea id="notes" name="notes" rows="18"
                            class="form-control bg-dark text-light border-secondary"
                            required>{{ entry.notes }}</textarea>

                        <div class="form-text text-light-emphasis mt-2">
                            Update your thoughts, emotions, mistakes, and lessons.
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            <a href="{{ url_for('entries') }}" class="btn btn-outline-light">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
