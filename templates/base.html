<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Trade Journal{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Favicon -->
    <link rel="icon" 
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%2322c55e'/></svg>">
</head>

<body>

    {% if current_user.is_authenticated %}
    <nav class="app-nav">
        <div class="app-nav__inner">

            <!-- Brand -->
            <a class="app-nav__brand" href="{{ url_for('dashboard') }}">
                <span class="app-nav__brand-dot"></span>
                Trade Journal
            </a>

            <!-- Links -->
            <ul class="app-nav__links">
                <li>
                    <a class="app-nav__link" href="{{ url_for('dashboard') }}">Dashboard</a>
                </li>
                <li>
                    <a class="app-nav__link" href="{{ url_for('entries') }}">Entries</a>
                </li>
                <li>
                    <a class="app-nav__link" href="{{ url_for('new_entry') }}">New Entry</a>
                </li>
            </ul>

            <!-- User section -->
            <div class="app-nav__user">
                <span class="app-nav__username">{{ current_user.username }}</span>
                <a class="app-nav__logout" href="{{ url_for('logout') }}">Logout</a>
            </div>

        </div>
    </nav>
    {% endif %}

    <!-- Main Content -->
    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
